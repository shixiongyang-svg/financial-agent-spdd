<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Helpdesk Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      padding: 48px;
      max-width: 600px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .status-card {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 20px;
      margin-top: 24px;
      text-align: left;
    }
    .status-label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 500;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.healthy {
      background: #22c55e;
    }
    .dot.unhealthy {
      background: #ef4444;
    }
    .api-response {
      margin-top: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 12px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      color: #475569;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .loading {
      color: #9ca3af;
      font-style: italic;
    }
    .query-card {
      margin-top: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
    }
    .query-label {
      font-size: 14px;
      color: #374151;
      margin-bottom: 8px;
      display: block;
      font-weight: 600;
    }
    .query-input {
      width: 100%;
      min-height: 84px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }
    .query-actions {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .query-btn {
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .query-btn[disabled] {
      background: #93c5fd;
      cursor: not-allowed;
    }
    .query-meta {
      font-size: 12px;
      color: #6b7280;
    }
    .answer-card {
      margin-top: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px 12px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 14px;
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Financial Helpdesk Agent</h1>
    <p class="subtitle">Environment scaffold — the full UI will be built in a later task.</p>

    <div class="status-card">
      <div class="status-label">API Health Check</div>
      <div class="status-indicator" id="status-indicator">
        <span class="dot unhealthy" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <div class="api-response" id="api-response">
        <span class="loading">Connecting to financial-agent-api...</span>
      </div>

      <div class="query-card">
        <label for="question-input" class="query-label">Ask the agent</label>
        <textarea id="question-input" class="query-input">What is an overdraft fee?</textarea>
        <div class="query-actions">
          <button id="ask-btn" class="query-btn" type="button">Send</button>
          <span class="query-meta" id="query-meta">POST /agent/query</span>
        </div>
        <div class="answer-card" id="answer-box">No answer yet.</div>
      </div>
    </div>
  </div>

  <script>
    const API_HEALTHZ_URL = 'http://financial-agent-api.localhost.com/healthz';
    const API_QUERY_URL = 'http://financial-agent-api.localhost.com/agent/query';

    async function checkHealth() {
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const apiResponse = document.getElementById('api-response');

      try {
        const response = await fetch(API_HEALTHZ_URL);
        const data = await response.json();

        if (response.ok && data.status === 'ok') {
          dot.className = 'dot healthy';
          statusText.textContent = 'API is healthy';
          apiResponse.innerHTML =
            '<strong>GET ' + API_HEALTHZ_URL + '</strong>\n' +
            'Status: ' + response.status + ' OK\n' +
            'Response: ' + JSON.stringify(data, null, 2);
        } else {
          dot.className = 'dot unhealthy';
          statusText.textContent = 'API returned unexpected response';
          apiResponse.textContent = 'Unexpected: ' + JSON.stringify(data);
        }
      } catch (err) {
        dot.className = 'dot unhealthy';
        statusText.textContent = 'API is unreachable';
        apiResponse.innerHTML =
          '<strong>GET ' + API_HEALTHZ_URL + '</strong>\n' +
          'Error: ' + err.message + '\n\n' +
          'Make sure all services are running (./start).';
      }
    }

    async function askAgent() {
      const askBtn = document.getElementById('ask-btn');
      const questionInput = document.getElementById('question-input');
      const answerBox = document.getElementById('answer-box');
      const queryMeta = document.getElementById('query-meta');
      const question = questionInput.value.trim();

      if (!question) {
        answerBox.textContent = 'Question cannot be empty.';
        return;
      }

      askBtn.disabled = true;
      queryMeta.textContent = 'Sending request...';
      answerBox.textContent = 'Loading...';

      try {
        const response = await fetch(API_QUERY_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            question,
            session_id: 'ui-session',
            conversation_history: [],
          }),
        });

        const data = await response.json();
        const reqId = data.request_id || response.headers.get('X-Request-Id') || '-';
        queryMeta.textContent = 'request_id: ' + reqId + ' | status: ' + response.status;

        if (!response.ok) {
          answerBox.textContent = (data && data.message) ? data.message : 'Request failed.';
          return;
        }

        answerBox.textContent = data.answer || '(empty answer)';
      } catch (err) {
        queryMeta.textContent = 'Request failed';
        answerBox.textContent = 'Network error: ' + err.message;
      } finally {
        askBtn.disabled = false;
      }
    }

    document.getElementById('ask-btn').addEventListener('click', askAgent);
    checkHealth();
  </script>
</body>
</html>
