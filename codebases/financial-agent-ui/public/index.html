<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Helpdesk Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      padding: 48px;
      max-width: 600px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .status-card {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 20px;
      margin-top: 24px;
    }
    .status-label {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 500;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.healthy {
      background: #22c55e;
    }
    .dot.unhealthy {
      background: #ef4444;
    }
    .api-response {
      margin-top: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 12px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 13px;
      color: #475569;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .loading {
      color: #9ca3af;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Financial Helpdesk Agent</h1>
    <p class="subtitle">Environment scaffold — the full UI will be built in a later task.</p>

    <div class="status-card">
      <div class="status-label">API Health Check</div>
      <div class="status-indicator" id="status-indicator">
        <span class="dot unhealthy" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
      <div class="api-response" id="api-response">
        <span class="loading">Connecting to financial-agent-api...</span>
      </div>
    </div>
  </div>

  <script>
    const API_HEALTHZ_URL = 'http://financial-agent-api.localhost.com/healthz';

    async function checkHealth() {
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      const apiResponse = document.getElementById('api-response');

      try {
        const response = await fetch(API_HEALTHZ_URL);
        const data = await response.json();

        if (response.ok && data.status === 'ok') {
          dot.className = 'dot healthy';
          statusText.textContent = 'API is healthy';
          apiResponse.innerHTML =
            '<strong>GET ' + API_HEALTHZ_URL + '</strong>\n' +
            'Status: ' + response.status + ' OK\n' +
            'Response: ' + JSON.stringify(data, null, 2);
        } else {
          dot.className = 'dot unhealthy';
          statusText.textContent = 'API returned unexpected response';
          apiResponse.textContent = 'Unexpected: ' + JSON.stringify(data);
        }
      } catch (err) {
        dot.className = 'dot unhealthy';
        statusText.textContent = 'API is unreachable';
        apiResponse.innerHTML =
          '<strong>GET ' + API_HEALTHZ_URL + '</strong>\n' +
          'Error: ' + err.message + '\n\n' +
          'Make sure all services are running (./start).';
      }
    }

    checkHealth();
  </script>
</body>
</html>
